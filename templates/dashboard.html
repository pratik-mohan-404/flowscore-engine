<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowScore | Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #040408;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1a1a3a 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #251a35 0%, transparent 50%);
        }

        .title-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .brand-title {
            background: linear-gradient(to right, #22d3ee, #818cf8, #f472b6, #22d3ee);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 8s linear infinite;
            display: inline-block;
            white-space: nowrap;
            padding-right: 20px;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .fixed-legend {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            width: 280px;
        }

        #cards-container {
            height: calc(100vh - 80px);
            overflow-y: auto;
            padding-top: 80px;
            scrollbar-width: thin;
            scrollbar-color: #4f46e5 transparent;
        }

        .spectrum-card {
            background: rgba(25, 25, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .glow-risk  { border-left: 4px solid #f43f5e; }
        .glow-mid   { border-left: 4px solid #fbbf24; }
        .glow-prime { border-left: 4px solid #10b981; }

        .cyber-input {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            padding: 0.85rem !important;
            font-size: 0.9rem;
        }
        .cyber-input:focus { border-color: #818cf8 !important; outline: none; }

        .cyber-select {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            padding: 0.85rem !important;
            font-size: 0.9rem;
            appearance: none;
            cursor: pointer;
        }
        .cyber-select:focus { border-color: #818cf8 !important; outline: none; }
        .cyber-select option { background: #0a0a14; color: #fff; }

        .hud-bar-container { display: flex; gap: 3px; height: 10px; width: 100%; }
        .hud-segment { flex: 1; height: 100%; border-radius: 1px; background: rgba(255, 255, 255, 0.03); }

        .card-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s ease, opacity 0.3s ease;
            opacity: 0;
            overflow: hidden;
        }
        .card-expanded .card-content { grid-template-rows: 1fr; opacity: 1; }
        .card-expanded { background: rgba(35, 35, 55, 0.8) !important; padding-bottom: 1.5rem !important; }

        .advisor-box {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 1.25rem;
        }

        /* Calculations section */
        .calc-section {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s ease, opacity 0.3s ease;
            opacity: 0;
            overflow: hidden;
        }
        .calc-open { grid-template-rows: 1fr; opacity: 1; }
        .calc-inner { min-height: 0; }

        .calc-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6366f1;
            margin-top: 14px;
            user-select: none;
        }
        .calc-toggle:hover { color: #818cf8; }

        .calc-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .calc-table td {
            padding: 5px 8px;
            font-size: 10px;
            font-family: 'Courier New', monospace;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .calc-table td:first-child { color: #64748b; width: 45%; }
        .calc-table td:nth-child(2) { color: #94a3b8; width: 35%; }
        .calc-table td:last-child { color: #22d3ee; text-align: right; font-weight: 700; }

        .section-label {
            font-size: 8px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #334155;
            padding: 8px 8px 4px;
        }

        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.04); margin: 6px 0; }

        /* Tab styles */
        .tab-btn {
            flex: 1;
            padding: 8px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #64748b;
        }
        .tab-btn.active {
            background: rgba(99,102,241,0.15);
            border-color: rgba(99,102,241,0.4);
            color: #818cf8;
        }
        .tab-btn:hover:not(.active) { color: #94a3b8; border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="fixed-legend">
        <div class="flex justify-between text-[10px] font-black mb-2 tracking-widest text-slate-500">
            <span>POOR (300)</span>
            <span>PRIME (900)</span>
        </div>
        <div class="h-1.5 w-full rounded-full bg-gradient-to-r from-rose-500 via-amber-400 via-yellow-300 to-emerald-500"></div>
        <div class="flex justify-between text-[10px] font-bold mt-2 text-slate-400">
            <span>300</span><span>450</span><span>600</span><span>750</span><span>900</span>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto grid grid-cols-12 gap-10 h-full">

        <!-- LEFT SIDEBAR -->
        <aside class="col-span-12 lg:col-span-4 flex flex-col">
            <div class="title-container">
                <h1 class="text-6xl font-extrabold tracking-tighter italic brand-title">FLOWSCORE</h1>
            </div>

            <div class="spectrum-card rounded-3xl p-8 border-t-2 border-t-indigo-500/20 shadow-2xl">

                <!-- Search mode tabs -->
                <div class="flex gap-2 mb-6">
                    <button class="tab-btn active" id="tab-id"     onclick="switchTab('id')">By Vendor ID</button>
                    <button class="tab-btn"         id="tab-filter" onclick="switchTab('filter')">By Risk Filter</button>
                </div>

                <!-- Tab: Vendor ID -->
                <div id="panel-id">
                    <form id="form-id" class="space-y-5" autocomplete="off">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Vendor ID (1 – 1000)</label>
                            <input type="number" id="vendor-id" placeholder="e.g. 42" class="cyber-input w-full rounded-xl" min="1" max="1000" required>
                        </div>
                        <p id="error-id" class="text-rose-400 text-xs font-bold hidden"></p>
                        <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-violet-700 hover:brightness-110 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95 text-[10px] tracking-[0.3em]">
                            ANALYZE NOW
                        </button>
                    </form>
                </div>

                <!-- Tab: Risk Filter -->
                <div id="panel-filter" class="hidden">
                    <form id="form-filter" class="space-y-5" autocomplete="off">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Risk Category</label>
                            <select id="risk-filter" class="cyber-select w-full rounded-xl">
                                <option value="all">All Vendors</option>
                                <option value="elite">Elite (750 – 900)</option>
                                <option value="strong">Strong (600 – 749)</option>
                                <option value="emerging">Emerging (450 – 599)</option>
                                <option value="poor">High Risk (300 – 449)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Show top N vendors</label>
                            <input type="number" id="top-n" placeholder="e.g. 5" class="cyber-input w-full rounded-xl" min="1" max="50" value="5">
                        </div>
                        <p id="error-filter" class="text-rose-400 text-xs font-bold hidden"></p>
                        <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-violet-700 hover:brightness-110 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95 text-[10px] tracking-[0.3em]">
                            FILTER VENDORS
                        </button>
                    </form>
                </div>

            </div>
        </aside>

        <!-- RIGHT CARDS -->
        <section class="col-span-12 lg:col-span-8" id="cards-container"></section>
    </div>

<script>
    const container = document.getElementById('cards-container');

    // ── Tab switching ──────────────────────────────────────
    function switchTab(tab) {
        document.getElementById('panel-id').classList.toggle('hidden',     tab !== 'id');
        document.getElementById('panel-filter').classList.toggle('hidden', tab !== 'filter');
        document.getElementById('tab-id').classList.toggle('active',       tab === 'id');
        document.getElementById('tab-filter').classList.toggle('active',   tab === 'filter');
    }

    // ── Single vendor by ID ────────────────────────────────
    document.getElementById('form-id').onsubmit = async (e) => {
        e.preventDefault();
        const errEl    = document.getElementById('error-id');
        errEl.classList.add('hidden');
        const vendorId = parseInt(document.getElementById('vendor-id').value);

        if (!vendorId || vendorId < 1) {
            errEl.textContent = 'Please enter a valid Vendor ID.';
            errEl.classList.remove('hidden');
            return;
        }

        const data = await fetchVendor(vendorId, errEl);
        if (data) { addCard(data); document.getElementById('form-id').reset(); }
    };

    // ── Risk filter ────────────────────────────────────────
    document.getElementById('form-filter').onsubmit = async (e) => {
        e.preventDefault();
        const errEl  = document.getElementById('error-filter');
        errEl.classList.add('hidden');
        const filter = document.getElementById('risk-filter').value;
        const topN   = parseInt(document.getElementById('top-n').value) || 5;

        try {
            const res  = await fetch('/filter', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ filter, top_n: topN })
            });
            const data = await res.json();
            if (data.error) { errEl.textContent = data.error; errEl.classList.remove('hidden'); return; }
            if (data.vendors.length === 0) {
                errEl.textContent = 'No vendors found in that category.';
                errEl.classList.remove('hidden');
                return;
            }
            data.vendors.forEach(v => addCard(v));
        } catch (err) {
            errEl.textContent = 'Could not connect to server.';
            errEl.classList.remove('hidden');
        }
    };

    // ── Fetch single vendor ────────────────────────────────
    async function fetchVendor(vendorId, errEl) {
        try {
            const res = await fetch('/predict', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ vendor_id: vendorId })
            });
            if (res.status === 404) {
                errEl.textContent = `Vendor ID ${vendorId} not found. Try 1–1000.`;
                errEl.classList.remove('hidden');
                return null;
            }
            const data = await res.json();
            if (data.error) { errEl.textContent = 'Error: ' + data.error; errEl.classList.remove('hidden'); return null; }
            return data;
        } catch (err) {
            errEl.textContent = 'Could not connect to server. Make sure Flask is running.';
            errEl.classList.remove('hidden');
            return null;
        }
    }

    // ── Add card to UI ─────────────────────────────────────
    function addCard(data) {
        const score = data.flowscore;
        const raw   = data.raw_values;
        const met   = data.metrics;
        const eng   = data.engineered;

        const nTxns  = Math.min(raw.avg_weekly_transactions / 50, 1);
        const nMerch = Math.min(raw.unique_merchants / 20, 1);
        const stab   = met["Income stability"]        / 100;
        const disc   = met["Bill payment discipline"] / 100;
        const sav    = met["Savings behaviour"]       / 100;

        let glow = "glow-risk";
        if      (score >= 750) glow = "glow-prime";
        else if (score >= 450) glow = "glow-mid";

        const cardId = `card-${data.vendor_id}-${Date.now()}`;
        const calcId = `calc-${data.vendor_id}-${Date.now()}`;

        const card = document.createElement('div');
        card.className = `spectrum-card rounded-[1.25rem] cursor-pointer group mb-4 transition-all p-4 ${glow}`;
        card.id = cardId;

        card.innerHTML = `
            <div class="flex items-center justify-between" onclick="document.getElementById('${cardId}').classList.toggle('card-expanded')">
                <div class="flex items-center gap-5">
                    <div class="h-10 w-10 bg-indigo-500/10 rounded-xl flex items-center justify-center text-indigo-300 font-bold border border-white/5">
                        ${data.vendor_id}
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-lg leading-none">Vendor #${data.vendor_id}</h3>
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">ID: FS-${data.vendor_id}</p>
                    </div>
                </div>
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <div class="text-3xl font-black text-white italic tracking-tighter">${score}</div>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Score</p>
                    </div>
                    <i class="fas fa-chevron-down text-slate-700 transition-colors"></i>
                </div>
            </div>

            <div class="card-content">
                <div class="min-h-0 pt-6 mt-6 border-t border-white/5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="grid grid-cols-1 gap-4">
                            ${createHUDBar("Weekly Transactions", nTxns * 100, "#22d3ee")}
                            ${createHUDBar("Unique Merchants",    nMerch * 100, "#fbbf24")}
                            ${createHUDBar("Income Stability",    stab * 100,   "#10b981")}
                            ${createHUDBar("Savings",             sav * 100,    "#f472b6")}
                        </div>

                        <div class="advisor-box p-5 flex flex-col justify-between">
                            <div>
                                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2">Strategic Recommendation</p>
                                <p class="text-sm text-slate-300 leading-relaxed font-medium italic">"${getSimpleVerdict(score)}"</p>
                            </div>
                            <div class="mt-4 flex justify-between items-center opacity-30 text-[9px] font-bold uppercase">
                                <span>Core_v5.1_Stable</span>
                                <i class="fas fa-chart-line text-lg"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Calculations toggle -->
                    <div class="calc-toggle" onclick="toggleCalc('${calcId}', this)">
                        <i class="fas fa-calculator text-xs"></i>
                        <span>SHOW CALCULATIONS</span>
                        <i class="fas fa-chevron-down text-xs ml-auto transition-transform" id="icon-${calcId}"></i>
                    </div>

                    <div class="calc-section" id="${calcId}">
                        <div class="calc-inner">
                            <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;margin-top:8px;border:1px solid rgba(255,255,255,0.04)">

                                <div class="section-label">Raw UPI Data</div>
                                <table class="calc-table">
                                    <tr><td>avg_weekly_transactions</td><td></td><td>${raw.avg_weekly_transactions}</td></tr>
                                    <tr><td>unique_merchants</td><td></td><td>${raw.unique_merchants}</td></tr>
                                    <tr><td>monthly_inflow</td><td></td><td>₹${raw.monthly_inflow.toLocaleString()}</td></tr>
                                    <tr><td>income_volatility</td><td></td><td>${raw.income_volatility}</td></tr>
                                    <tr><td>savings_ratio</td><td></td><td>${raw.savings_ratio}</td></tr>
                                    <tr><td>bill_payment_timing</td><td></td><td>${raw.bill_payment_timing}</td></tr>
                                </table>

                                <hr class="divider">
                                <div class="section-label">Feature Engineering</div>
                                <table class="calc-table">
                                    <tr><td>transaction_consistency</td><td>${raw.avg_weekly_transactions} / 50</td><td>${eng.transaction_consistency}</td></tr>
                                    <tr><td>merchant_diversity</td><td>${raw.unique_merchants} / 20</td><td>${eng.merchant_diversity}</td></tr>
                                    <tr><td>income_stability</td><td>1 − ${raw.income_volatility}</td><td>${eng.income_stability}</td></tr>
                                    <tr><td>savings_score</td><td>${raw.savings_ratio}</td><td>${eng.savings_score}</td></tr>
                                    <tr><td>temporal_score</td><td>${raw.bill_payment_timing}</td><td>${eng.temporal_score}</td></tr>
                                </table>

                                <hr class="divider">
                                <div class="section-label">FlowScore Calculation</div>
                                <table class="calc-table">
                                    <tr><td>XGBoost probability</td><td></td><td>${data.prob}</td></tr>
                                    <tr><td>FlowScore</td><td>300 + (${data.prob} × 600)</td><td style="color:#818cf8">${score}</td></tr>
                                </table>

                            </div>
                        </div>
                    </div>

                </div>
            </div>
        `;

        container.prepend(card);
    }

    // ── Toggle calculations ────────────────────────────────
    function toggleCalc(id, el) {
        const section = document.getElementById(id);
        const icon    = document.getElementById(`icon-${id}`);
        const isOpen  = section.classList.contains('calc-open');
        section.classList.toggle('calc-open', !isOpen);
        icon.style.transform = isOpen ? '' : 'rotate(180deg)';
        el.querySelector('span').textContent = isOpen ? 'SHOW CALCULATIONS' : 'HIDE CALCULATIONS';
        event.stopPropagation();
    }

    // ── HUD bar ────────────────────────────────────────────
    function createHUDBar(label, pct, color) {
        let segments = '';
        for (let i = 0; i < 15; i++) {
            const active = (pct / 100) * 15 > i;
            segments += `<div class="hud-segment" style="background:${active ? color : 'rgba(255,255,255,0.02)'}"></div>`;
        }
        return `
            <div>
                <div class="flex justify-between text-[9px] font-bold text-slate-500 mb-1.5 uppercase tracking-widest">
                    <span>${label}</span>
                    <span style="color:${color}">${Math.round(pct)}%</span>
                </div>
                <div class="hud-bar-container">${segments}</div>
            </div>`;
    }

    // ── Verdict ────────────────────────────────────────────
    function getSimpleVerdict(s) {
        if      (s < 450)  return "Critical volatility detected. Business shows inconsistent cash flow and insufficient reserves. Support is not recommended at this stage.";
        else if (s < 600)  return "Limited stability observed. While the business is operational, it lacks the volume for major expansion. Monitor closely for 30 days.";
        else if (s < 750)  return "Steady performance with healthy merchant diversity. This business is a safe candidate for standard credit and moderate growth support.";
        else               return "Exceptional financial health and discipline. Business demonstrates high-tier stability and is ready for full-scale premium support.";
    }
</script>
</body>
</html>
